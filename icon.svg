<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#313244"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22"
        fill="none" stroke="#89b4fa" stroke-width="3" opacity="0.6"/>
  <text x="64" y="56" font-family="Helvetica, Arial, sans-serif" font-size="28"
        font-weight="bold" fill="#89b4fa" text-anchor="middle">smpl</text>
  <!-- Looping waveform: in/out brackets bookend an oscillating line -->
  <g stroke="#a6e3a1" stroke-width="3.5" stroke-linecap="round"
     stroke-linejoin="round" fill="none">
    <!-- in bracket -->
    <path d="M 22 86 L 22 100 L 28 100"/>
    <!-- waveform between brackets -->
    <path d="M 30 95 L 36 80 L 42 100 L 48 76 L 54 100 L 60 84 L 66 100 L 72 80 L 78 100 L 84 88 L 90 100 L 96 84"/>
    <!-- out bracket -->
    <path d="M 100 100 L 106 100 L 106 86"/>
  </g>
</svg>
